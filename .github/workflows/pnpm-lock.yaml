name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # Denna miljövariabel tvingar actions att köra på Node 24 enligt varningen
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Install pnpm
      uses: pnpm/action-setup@v4 # Uppdaterat till v4 för bättre stöd
      with:
        version: 9 # Uppdaterat till v9 (vanligast 2026)
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24' # Uppdaterat till Node 24
        cache: 'pnpm'
        
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      
    - name: Build
      env:
        VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
        VITE_FORMSPREE_FORM_ID: ${{ secrets.VITE_FORMSPREE_FORM_ID }}
      run: pnpm run build
      
    - name: Setup Pages
      uses: actions/configure-pages@v5 # Uppdaterat till v5
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './dist'
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4